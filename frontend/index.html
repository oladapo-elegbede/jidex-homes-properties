<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon (Browser Tab Icon) ────────────────────────── -->
    <link rel="icon" type="image/png" href="/jidex-logo.png" />
    <link rel="apple-touch-icon" href="/jidex-logo.png" />

    <!-- ── Page Title (Browser Tab Text) ─────────────────────── -->
    <title>Jidex Homes & Properties | Premium Property Marketplace</title>

    <!-- ── SEO Meta Tags ─────────────────────────────────────── -->
    <meta
      name="description"
      content="Discover premium properties across Nigeria. Browse apartments, houses, villas, and more on Jidex Homes & Properties — the trusted property marketplace connecting buyers, renters, and agents."
    />
    <meta name="author" content="Jidex Homes & Properties" />
    <meta name="theme-color" content="#1B2A4A" />

    <!-- ── Open Graph Tags (Social Media Sharing) ────────────── -->
    <!-- When someone shares your link on Facebook/LinkedIn/etc, these show -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Jidex Homes & Properties" />
    <meta
      property="og:description"
      content="Premium property marketplace connecting buyers, renters, and agents across Nigeria."
    />
    <meta property="og:image" content="/jidex-logo.png" />

    <!-- ── Twitter Card Tags (Twitter/X Sharing) ─────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jidex Homes & Properties" />
    <meta
      name="twitter:description"
      content="Premium property marketplace connecting buyers, renters, and agents across Nigeria."
    />
    <meta name="twitter:image" content="/jidex-logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
